<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Events - Ignite Guild App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --orange: #eb7100;
      --teal: #99c2b1;
      --magenta: #be1348;
      --purple: #9245ac;
      --gold: #ffc255;
      --vanilla: #f4ecdc;
      --graphite: #1f1f1f;
      --text: #f4ecdc;
      --muted: #99c2b1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #2d2420 0, var(--graphite) 55%, #000 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      background: linear-gradient(145deg, #1a1816 0%, var(--graphite) 100%);
      border-radius: 24px;
      border: 1px solid rgba(153,194,177,0.15);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.8),
        0 0 0 1px rgba(0,0,0,0.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid rgba(153,194,177,0.2);
      background: radial-gradient(circle at top left, rgba(235,113,0,0.15), transparent 60%);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      background: none;
      border: 1px solid rgba(153,194,177,0.3);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      transition: all 140ms ease-out;
    }

    .back-btn:hover {
      border-color: var(--orange);
      background: rgba(235,113,0,0.12);
    }

    .app-title-block {
      flex: 1;
    }

    .app-title-block h1 {
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .app-title-block p {
      font-size: 12px;
      color: var(--muted);
    }

    .app-main {
      padding: 16px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
      overflow-y: auto;
      max-height: calc(100vh - 200px);
    }

    .mini-calendar {
      background: rgba(235,113,0,0.08);
      border: 1px solid rgba(235,113,0,0.25);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 4px;
    }

    .cal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .cal-month {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-day-label {
      font-size: 10px;
      text-align: center;
      color: var(--muted);
      font-weight: 600;
      padding: 4px 0;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      border-radius: 6px;
      color: var(--text);
      position: relative;
    }

    .cal-day.event {
      background: rgba(235,113,0,0.25);
      border: 1px solid rgba(235,113,0,0.5);
      font-weight: 700;
      color: var(--gold);
    }

    .cal-day.today {
      background: rgba(153,194,177,0.2);
      border: 1px solid var(--teal);
    }

    .cal-day.empty {
      opacity: 0.3;
    }

    .events-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .event-card {
      position: relative;
      border-radius: 18px;
      padding: 14px 14px 12px;
      background: radial-gradient(circle at top left, rgba(244,236,220,0.02), rgba(31,31,31,0.98));
      border: 1px solid rgba(153,194,177,0.2);
      overflow: hidden;
      transition:
        transform 140ms ease-out,
        box-shadow 140ms ease-out,
        border-color 160ms ease-out;
    }

    .event-card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background:
        radial-gradient(circle at top left, rgba(235,113,0,0.18), transparent 55%),
        radial-gradient(circle at bottom right, rgba(146,69,172,0.18), transparent 55%);
      opacity: 0;
      transition: opacity 160ms ease-out;
      pointer-events: none;
    }

    .event-card:hover::before {
      opacity: 1;
    }

    .event-card:hover {
      transform: translateY(-2px);
      box-shadow:
        0 16px 40px rgba(0,0,0,0.9),
        0 0 0 1px rgba(0,0,0,0.6);
      border-color: rgba(235,113,0,0.6);
    }

    .event-date {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .event-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--vanilla);
    }

    .event-time {
      font-size: 12px;
      color: var(--orange);
      margin-bottom: 6px;
    }

    .event-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .event-link {
      font-size: 11px;
      color: var(--teal);
      text-decoration: none;
      border: 1px solid rgba(153,194,177,0.4);
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-block;
      transition: all 140ms ease-out;
    }

    .event-link:hover {
      background: rgba(153,194,177,0.12);
      border-color: var(--teal);
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: var(--muted);
    }

    .empty-state p {
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .app {
        border-radius: 22px;
      }

      .event-card {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a href="index.html" class="back-btn">← Back</a>
      <div class="app-title-block">
        <h1>Events</h1>
        <p>Guild calendar</p>
      </div>
    </header>

    <main class="app-main">
      <div class="mini-calendar" id="calendar"></div>
      <div class="events-list" id="eventsList"></div>
    </main>
  </div>

  <script>
    // Build calendar for March 2026
    function buildCalendar() {
      const calendarEl = document.getElementById('calendar');
      const today = 9; // March 9th
      const eventDays = [13, 19]; // Days with events
      
      const header = '<div class="cal-header"><div class="cal-month">March 2026</div></div>';
      
      const dayLabels = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
      const labelRow = dayLabels.map(d => `<div class="cal-day-label">${d}</div>`).join('');
      
      // March 2026 starts on Sunday, has 31 days
      let days = '';
      for (let i = 1; i <= 31; i++) {
        let classes = 'cal-day';
        if (i === today) classes += ' today';
        if (eventDays.includes(i)) classes += ' event';
        days += `<div class="${classes}">${i}</div>`;
      }
      
      calendarEl.innerHTML = `
        ${header}
        <div class="cal-grid">
          ${labelRow}
          ${days}
        </div>
      `;
    }

    async function loadEvents() {
      try {
        const response = await fetch('events.json');
        const events = await response.json();
        const eventsList = document.getElementById('eventsList');

        if (!events || events.length === 0) {
          eventsList.innerHTML = '<div class="empty-state"><p>No events scheduled yet.</p></div>';
          return;
        }

        eventsList.innerHTML = events.map(event => `
          <div class="event-card">
            <div class="event-date">${event.date}</div>
            <div class="event-title">${event.name}</div>
            <div class="event-time">⏱ ${event.time}</div>
            <div class="event-desc">${event.description}</div>
            <a href="${event.link}" target="_blank" class="event-link">View on Neopets →</a>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error loading events:', error);
        document.getElementById('eventsList').innerHTML = '<div class="empty-state"><p>Error loading events. Please try again.</p></div>';
      }
    }

    buildCalendar();
    loadEvents();
  </script>
</body>
</html>
