<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Events - Ignite Guild App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #050816;
      --bg-alt: #0f172a;
      --accent: #f97316;
      --accent-soft: rgba(249,115,22,0.12);
      --text: #f9fafb;
      --muted: #9ca3af;
      --card: #020617;
      --border: rgba(148,163,184,0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e293b 0, #020617 55%, #000 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      background: linear-gradient(145deg, var(--bg) 0%, var(--bg-alt) 100%);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow:
        0 20px 60px rgba(15,23,42,0.8),
        0 0 0 1px rgba(15,23,42,0.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid rgba(148,163,184,0.35);
      background: radial-gradient(circle at top left, rgba(249,115,22,0.22), transparent 60%);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      background: none;
      border: 1px solid rgba(148,163,184,0.5);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      transition: all 140ms ease-out;
    }

    .back-btn:hover {
      border-color: var(--accent);
      background: rgba(249,115,22,0.12);
    }

    .app-title-block {
      flex: 1;
    }

    .app-title-block h1 {
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .app-title-block p {
      font-size: 12px;
      color: var(--muted);
    }

    .app-main {
      padding: 16px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
      overflow-y: auto;
      max-height: calc(100vh - 200px);
    }

    .events-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .event-card {
      position: relative;
      border-radius: 18px;
      padding: 14px 14px 12px;
      background: radial-gradient(circle at top left, rgba(248,250,252,0.02), rgba(15,23,42,0.98));
      border: 1px solid rgba(148,163,184,0.35);
      overflow: hidden;
      transition:
        transform 140ms ease-out,
        box-shadow 140ms ease-out,
        border-color 160ms ease-out;
    }

    .event-card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background:
        radial-gradient(circle at top left, rgba(251,146,60,0.18), transparent 55%),
        radial-gradient(circle at bottom right, rgba(56,189,248,0.18), transparent 55%);
      opacity: 0;
      transition: opacity 160ms ease-out;
      pointer-events: none;
    }

    .event-card:hover::before {
      opacity: 1;
    }

    .event-card:hover {
      transform: translateY(-2px);
      box-shadow:
        0 16px 40px rgba(15,23,42,0.9),
        0 0 0 1px rgba(15,23,42,0.6);
      border-color: rgba(249,115,22,0.85);
    }

    .event-date {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .event-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #f9fafb;
    }

    .event-time {
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .event-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .event-link {
      font-size: 11px;
      color: #38bdf8;
      text-decoration: none;
      border: 1px solid rgba(56,189,248,0.6);
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-block;
      transition: all 140ms ease-out;
    }

    .event-link:hover {
      background: rgba(56,189,248,0.12);
      border-color: #38bdf8;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: var(--muted);
    }

    .empty-state p {
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .app {
        border-radius: 22px;
      }

      .event-card {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a href="index.html" class="back-btn">← Back</a>
      <div class="app-title-block">
        <h1>Events</h1>
        <p>Guild calendar</p>
      </div>
    </header>

    <main class="app-main">
      <div class="events-list" id="eventsList"></div>
    </main>
  </div>

  <script>
    async function loadEvents() {
      try {
        const response = await fetch('events.json');
        const events = await response.json();
        const eventsList = document.getElementById('eventsList');

        if (!events || events.length === 0) {
          eventsList.innerHTML = '<div class="empty-state"><p>No events scheduled yet.</p></div>';
          return;
        }

        eventsList.innerHTML = events.map(event => `
          <div class="event-card">
            <div class="event-date">${event.date}</div>
            <div class="event-title">${event.name}</div>
            <div class="event-time">⏱ ${event.time}</div>
            <div class="event-desc">${event.description}</div>
            <a href="${event.link}" target="_blank" class="event-link">View on Neopets →</a>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error loading events:', error);
        document.getElementById('eventsList').innerHTML = '<div class="empty-state"><p>Error loading events. Please try again.</p></div>';
      }
    }

    loadEvents();
  </script>
</body>
</html>
