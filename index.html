<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ignite Guild App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --orange: #eb7100;
      --teal: #99c2b1;
      --magenta: #be1348;
      --purple: #9245ac;
      --gold: #ffc255;
      --vanilla: #f4ecdc;
      --graphite: #1f1f1f;
      --text: #f4ecdc;
      --muted: #99c2b1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #2d2420 0, var(--graphite) 55%, #000 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      background: linear-gradient(145deg, #1a1816 0%, var(--graphite) 100%);
      border-radius: 24px;
      border: 1px solid rgba(153,194,177,0.15);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.8),
        0 0 0 1px rgba(0,0,0,0.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(153,194,177,0.25);
      background: radial-gradient(circle at top left, rgba(235,113,0,0.15), transparent 60%);
    }

    .app-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-orb {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background:
        conic-gradient(from 210deg, #eb7100, #ffc255, #eb7100, #99c2b1, #9245ac, #be1348, #eb7100);
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 20px rgba(235,113,0,0.5),
        0 0 40px rgba(146,69,172,0.3);
    }

    .logo-orb-inner {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: radial-gradient(circle at 30% 20%, #ffc255 0, #eb7100 18%, #4c0519 70%, var(--graphite) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--graphite);
      text-shadow: 0 0 8px rgba(244,236,220,0.5);
    }

    .app-title-block h1 {
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .app-title-block p {
      font-size: 13px;
      color: var(--muted);
    }

    .pill-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .pill {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(153,194,177,0.4);
      background: rgba(31,31,31,0.9);
      color: var(--muted);
    }

    .pill--accent {
      border-color: rgba(235,113,0,0.7);
      background: rgba(235,113,0,0.12);
      color: #ffc255;
    }

    .app-main {
      padding: 16px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin: 2px 2px 4px;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .nav-card {
      position: relative;
      border-radius: 18px;
      padding: 14px 12px 12px;
      background: radial-gradient(circle at top left, rgba(244,236,220,0.02), rgba(31,31,31,0.98));
      border: 1px solid rgba(153,194,177,0.25);
      overflow: hidden;
      cursor: pointer;
      transition:
        transform 140ms ease-out,
        box-shadow 140ms ease-out,
        border-color 160ms ease-out,
        background 160ms ease-out;
      min-height: 86px;
    }

    .nav-card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background:
        radial-gradient(circle at top left, rgba(235,113,0,0.18), transparent 55%),
        radial-gradient(circle at bottom right, rgba(146,69,172,0.18), transparent 55%);
      opacity: 0;
      transition: opacity 160ms ease-out;
      pointer-events: none;
    }

    .nav-card:hover, .nav-card:focus-visible {
      transform: translateY(-2px);
      box-shadow:
        0 16px 40px rgba(0,0,0,0.9),
        0 0 0 1px rgba(0,0,0,0.6);
      border-color: rgba(235,113,0,0.7);
    }

    .nav-card:hover::before,
    .nav-card:focus-visible::before {
      opacity: 1;
    }

    .nav-card:focus-visible {
      outline: 2px solid rgba(235,113,0,0.9);
      outline-offset: 2px;
    }

    .nav-chip-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      margin-bottom: 6px;
    }

    .nav-chip {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #e5e7eb;
    }

    .nav-pill {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(153,194,177,0.4);
      color: var(--muted);
      background: rgba(31,31,31,0.95);
      white-space: nowrap;
    }

    .nav-pill--accent {
      border-color: rgba(235,113,0,0.8);
      color: #ffc255;
      background: rgba(235,113,0,0.12);
    }

    .nav-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--vanilla);
    }

    .nav-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .nav-tagline {
      margin-top: 6px;
      font-size: 11px;
      color: #e5e7eb;
      font-style: italic;
    }

    .footer-tip {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 6px 8px 4px;
      border-radius: 999px;
      border: 1px dashed rgba(153,194,177,0.4);
      background: rgba(31,31,31,0.95);
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .app {
        border-radius: 22px;
      }

      .nav-grid {
        gap: 8px;
      }

      .nav-card {
        min-height: 82px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="app-title-row">
        <div class="logo-orb">
          <div class="logo-orb-inner">I</div>
        </div>
        <div class="app-title-block">
          <h1>Ignite Guild App</h1>
          <p>Events, members, archives, and council in one place.</p>
        </div>
      </div>
      <div class="pill-row">
        <span class="pill pill--accent">Beta · Read Only</span>
        <span class="pill">Guild Use Only</span>
        <span class="pill">No Login Required</span>
      </div>
    </header>

    <main class="app-main">
      <p class="section-label">Navigation</p>

      <div class="nav-grid">
        <button class="nav-card" type="button">
          <div class="nav-chip-row">
            <span class="nav-chip">Events Calendar</span>
            <span class="nav-pill nav-pill--accent">Soon: reminders</span>
          </div>
          <div class="nav-title">Upcoming Ignite Events</div>
          <p class="nav-desc">
            See what's scheduled for the guild, from casual hangs to big themed events.
          </p>
          <p class="nav-tagline">Tap to view events (coming next).</p>
        </button>

        <button class="nav-card" type="button">
          <div class="nav-chip-row">
            <span class="nav-chip">Member Directory</span>
            <span class="nav-pill">Read only</span>
          </div>
          <div class="nav-title">Guild Members</div>
          <p class="nav-desc">
            Browse members, roles, and timezones so planning and pings are easier.
          </p>
          <p class="nav-tagline">Tap to browse members (coming next).</p>
        </button>

        <button class="nav-card" type="button">
          <div class="nav-chip-row">
            <span class="nav-chip">Gallery & Archive</span>
            <span class="nav-pill">Art · Writing</span>
          </div>
          <div class="nav-title">Ignite Creations</div>
          <p class="nav-desc">
            A cozy archive for guild art, writing, and special projects.
          </p>
          <p class="nav-tagline">Tap to view gallery (coming next).</p>
        </button>

        <button class="nav-card" type="button">
          <div class="nav-chip-row">
            <span class="nav-chip">Guides & Links</span>
            <span class="nav-pill">Petpages · Resources</span>
          </div>
          <div class="nav-title">Guild Guides</div>
          <p class="nav-desc">
            Quick links to rules, getting started info, and helpful resources.
          </p>
          <p class="nav-tagline">Tap for guides (coming next).</p>
        </button>

        <button class="nav-card" type="button">
          <div class="nav-chip-row">
            <span class="nav-chip">Council Profiles</span>
            <span class="nav-pill">Who does what</span>
          </div>
          <div class="nav-title">Ignite Council</div>
          <p class="nav-desc">
            Meet the council and see what each person handles for the guild.
          </p>
          <p class="nav-tagline">Tap to view council (coming next).</p>
        </button>

        <button class="nav-card" type="button">
          <div class="nav-chip-row">
            <span class="nav-chip">Notifications</span>
            <span class="nav-pill">Planned</span>
          </div>
          <div class="nav-title">Event Alerts</div>
          <p class="nav-desc">
            Future toggle for reminders when new events go live.
          </p>
          <p class="nav-tagline">This will hook into push later.</p>
        </button>
      </div>

      <p class="footer-tip">
        This is a prototype home screen. Next we'll wire up the Events page and real data.
      </p>
    </main>
  </div>

  <script>
    // Make the Events Calendar button navigate to events.html
    document.querySelectorAll('.nav-card')[0].addEventListener('click', () => {
      window.location.href = 'events.html';
    });
  </script>
</body>
</html>
